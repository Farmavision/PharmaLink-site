<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmLink | Welcome</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #eaf8b2; 
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        .splash-container {
            text-align: center;
            width: 100%;
            max-width: 800px; 
            padding: 20px;
        }

        #splashVideo {
            width: 100%;
            height: auto;
            background-color: #eaf8b2; 
            border: none;
            outline: none;
            /* Il box-shadow aiuta a sfumare i bordi del video con lo sfondo */
            box-shadow: 0 0 30px 30px #eaf8b2; 
            /* Importante: rimuove lo scatto tra i profili colore */
            filter: saturate(1.1); 
        }

        .claim {
            margin-top: 30px;
            font-size: 1.1rem;
            color: #17304a; 
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 5px;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="splash-container">
        <video id="splashVideo" autoplay muted playsinline>
            <source src="assets/video/tuo-video.webm" type="video/webm">
        </video>
        
        <div class="claim">Integrazione Intelligente</div>
    </div>

    <script>
        const video = document.getElementById('splashVideo');

        // Questa funzione scatta solo quando il video è arrivato alla fine
        video.onended = function() {
            // Il video rimane fermo sull'ultimo fotogramma
            // Aspettiamo 1 secondo per dare stabilità al logo finale
            setTimeout(function() {
                window.location.href = "home.html"; 
            }, 1000); 
        };

        // Sicurezza: se il video fallisce il caricamento dopo 7 secondi, vai comunque alla home
        setTimeout(function() {
            window.location.href = "home.html";
        }, 7000);
    </script>
</body>
</html>
