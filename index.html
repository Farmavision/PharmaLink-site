<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="6;url=home.html">
    <title>PharmLink | Welcome</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #0a192f;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        .splash-container {
            text-align: center;
            z-index: 10;
        }

        /* Video styling */
        .splash-video {
            width: 100%;
            max-width: 500px; /* Regola la grandezza del video */
            height: auto;
            border-radius: 15px; /* Arrotonda i bordi se vuoi un look più morbido */
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.2); /* Leggero bagliore verde */
            margin-bottom: 20px;
        }

        .claim {
            font-size: 1.2rem;
            color: #00ff88;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="splash-container">
        <video class="splash-video" autoplay muted playsinline>
            <source src="assets/img/splash-video.mp4" type="video/mp4">
            Il tuo browser non supporta il tag video.
        </video>
        
        <div class="claim">Integrazione Intelligente</div>
    </div>

</body>
</html>
