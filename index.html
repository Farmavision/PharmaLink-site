<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmLink | Welcome</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            /* Sfondo Tortora/Menta chiaro */
            background-color: #eaf8b2; 
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        .splash-container {
            text-align: center;
            width: 100%;
            max-width: 800px; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Stile essenziale per il video */
        #splashVideo {
            width: 100%;
            height: auto;
            border: none;
            outline: none;
            background-color: transparent; 
        }

        .claim {
            margin-top: 30px;
            font-size: 1.1rem;
            color: #17304a; 
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 5px;
            
            /* EFFETTO APPARIZIONE AL 3° SECONDO */
            opacity: 0; /* Parte invisibile */
            animation: fadeInOnSpot 1.5s forwards; /* Dura 1.5 secondi */
            animation-delay: 3s; /* Parte dopo 3 secondi */
        }

        /* Animazione fluida sul posto */
        @keyframes fadeInOnSpot {
            from {
                opacity: 0;
            }
            to {
                opacity: 0.9; /* Opacità finale come nel tuo originale */
            }
        }
    </style>
</head>
<body>

    <div class="splash-container">
        <video id="splashVideo" autoplay muted playsinline preload="auto">
           <source src="assets/img/Splash-page.webm" type="video/webm">
        </video>
        
        <div class="claim">TRASFORMA UN OBBLIGO IN OPPORTUNITA'</div>
    </div>

    <script>
        const video = document.getElementById('splashVideo');

        // Scatta quando il video si ferma sull'ultimo fotogramma
        video.onended = function() {
            setTimeout(function() {
                window.location.href = "home.html"; 
            }, 1000); 
        };

        // Rete di salvataggio: se il file non viene trovato o il video è lungo, va alla home dopo 8 secondi
        // Ho aumentato a 8s per dare tempo al video di finire dopo l'apparizione della scritta al 3° sec
        setTimeout(function() {
            window.location.href = "home.html";
        }, 8000);
    </script>
</body>
</html>
