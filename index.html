<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmLink | Welcome</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            /* Sfondo Tortora/Menta chiaro */
            background-color: #eaf8b2; 
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        .splash-container {
            text-align: center;
            width: 100%;
            max-width: 800px; 
            padding: 20px;
        }

        /* Stile essenziale per non far sparire il video */
        #splashVideo {
            width: 100%;
            height: auto;
            border: none;
            outline: none;
            background-color: transparent; 
        }

        .claim {
            margin-top: 30px;
            font-size: 1.1rem;
            color: #17304a; 
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 5px;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="splash-container">
        <video id="splashVideo" autoplay muted playsinline preload="auto">
           <source src="assets/img/Splash-page.webm" type="video/webm">
            </video>
        
        <div class="claim">TRASFORMA UN OBBLIGO IN OPPURTUNITA'</div>
    </div>

    <script>
        const video = document.getElementById('splashVideo');

        // Scatta quando il video si ferma sull'ultimo fotogramma
        video.onended = function() {
            setTimeout(function() {
                window.location.href = "home.html"; 
            }, 1000); 
        };

        // Rete di salvataggio: se il file non viene trovato, va alla home dopo 6 secondi
        setTimeout(function() {
            window.location.href = "home.html";
        }, 6000);
    </script>
</body>
</html>
