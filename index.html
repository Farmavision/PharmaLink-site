<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="6;url=home.html">
    <title>PharmLink | Welcome</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #0a192f;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        .splash-container {
            width: 100%;
            max-width: 600px;
            text-align: center;
            padding: 20px;
        }

        .splash-video {
            width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.15);
            /* Importante: assicura che il video non sia invisibile mentre carica */
            background-color:#eaf8b2; 
        }

        .claim {
            margin-top: 30px;
            font-size: 1.1rem;
            color: #00ff88;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 5px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="splash-container">
        <video class="splash-video" autoplay muted playsinline loop>
            <source src="assets/img/Splash-page.mp4" type="video/mp4">
            Caricamento in corso...
        </video>
        
        <div class="claim">Integrazione Intelligente</div>
    </div>

</body>
</html>
