<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="4;url=home.html">
    <title>PharmLink | Benvenuto</title>
    <style>
        body {
            background-color: #0a192f; /* Colore del tuo motore */
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        .splash-container {
            animation: fadeIn 1.5s ease-in-out;
        }

        .logo-main {
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 10px;
        }

        .logo-main span {
            color: #00ff88; /* Il verde neon della tua croce farmacia */
        }

        .claim {
            font-size: 1.5rem;
            color: #cbd5e1;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 4px;
            opacity: 0.8;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="splash-container">
        <div class="logo-main">PHARM<span>LINK</span></div>
        <div class="claim">L'integrazione intelligente.</div>
    </div>

</body>
</html>
