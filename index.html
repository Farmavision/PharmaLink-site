<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="4;url=home.html">
    <title>PharmLink | Benvenuto</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0a192f; /* Colore profondo del motore PharmLink */
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        .splash-container {
            /* L'intera sezione sfuma verso l'alto all'avvio */
            animation: fadeInContainer 1.5s ease-out;
        }

        /* STILE LOGO IMMAGINE */
        .splash-logo {
            display: block;
            margin: 0 auto 25px; /* Centra orizzontalmente e distanzia dal claim */
            max-width: 320px;    /* Dimensione ottimale su desktop */
            width: 65%;          /* Si adatta automaticamente su smartphone */
            height: auto;        /* Mantiene le proporzioni originali */
            
            /* Animazione specifica per il logo: appare e si ingrandisce leggermente */
            animation: logoEntrance 2s ease-out;
        }

        .claim {
            font-size: 1.4rem;
            color: #cbd5e1;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 4px;
            opacity: 0.8;
            margin-top: 10px;
        }

        /* ANIMAZIONI */
        @keyframes fadeInContainer {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes logoEntrance {
            0% { opacity: 0; transform: scale(0.9); }
            50% { opacity: 0.5; }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="splash-container">
        <img src="assets/img/logo.png" alt="PharmLink Logo" class="splash-logo">
        <div class="claim">L'integrazione intelligente.</div>
    </div>

</body>
</html>
